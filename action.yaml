---
name: 'xslint-action'
description: 'Xslint linter GitHub action'
branding:
  icon: alert-triangle
  color: orange
inputs:
  dir:
    description: 'Working directory'
    required: true
    default: '.'
  suppress:
    description: 'Check to suppress'
    required: false
runs:
  using: 'docker'
  image: Dockerfile
  args:
    - "${{ inputs.dir }}"
    - "${{ inputs.suppress }}"
