---
# yamllint disable rule:line-length
name: make
'on':
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
jobs:
  make:
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Diagnostics
        run: |
          set +e
          echo "node=$(node -v) npm=$(npm -v)"
          echo "--- npx with full capture ---"
          npx --yes @maxonfjvipon/xslint@0.0.6 xsl-packs/xsl-with-some-violations.xsl > /tmp/o.txt 2>&1
          echo "rc=$? bytes=$(wc -c < /tmp/o.txt)"
          cat /tmp/o.txt
          echo "--- npm debug logs ---"
          tail -n 60 ~/.npm/_logs/*.log 2>/dev/null || echo "no logs"
      - name: Run makefile
        run: make all
