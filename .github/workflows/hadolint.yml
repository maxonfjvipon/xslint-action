---
# yamllint disable rule:line-length
name: hadolint
'on':
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
jobs:
  hadolint:
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
