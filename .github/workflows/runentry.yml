---
# yamllint disable rule:line-length
name: runmake
'on':
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
jobs:
  runmake:
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Run entry.sh
        run: ./entry.sh
        env:
          args: |
            xsl-packs/xsl-with-no-violations.xsl
            xsl-packs/xsl-with-some-violations.xsl
          suppress: |
            empty-content-in-instruction
            template-match-starts-with-double-slash
